version: "3.1"

services:
  lobo-liquibase:
    container_name: lobo-liquibase
    image: liquibase/liquibase

    command: >
      update
      --changelog-file=changelog.xml
      --username=postgres
      --password=postgres
      --url=jdbc:postgresql://localhost:5432/postgres
      --classpath=/liquibase/classpath/postgresql.jar

    volumes:
      - ./config/changelog.xml:/liquibase/changelog.xml
      - ./scripts:/liquibase/scripts
      - ./postgresql-42.7.3.jar:/liquibase/classpath/postgresql.jar   # ✅ IMPORTANT

    networks:
      - lobo-net

networks:
  lobo-net: