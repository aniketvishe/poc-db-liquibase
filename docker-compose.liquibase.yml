version: '3.8'

services:
  lobo-liquibase:
    image: liquibase/liquibase:5.0.2
    container_name: lobo-liquibase

    command: >
      --url=jdbc:oracle:thin:@//192.168.2.185:1521/XE
      --username=system
      --password=oracle
      --changeLogFile=changelog.xml
      --log-level=debug
      update

    volumes:
      - ./config:/liquibase/changelog
      - ./scripts:/liquibase/changelog/scripts
      - ./drivers:/liquibase/lib

    working_dir: /liquibase/changelog
