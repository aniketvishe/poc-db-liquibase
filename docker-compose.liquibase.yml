services:
  lobo-liquibase:
    image: liquibase/liquibase:5.0.2
    container_name: lobo-liquibase

    command: >
      --url=jdbc:oracle:thin:@//192.168.2.185:1521/XE
      --username=system
      --password=oracle
      --changelog-file=changelog.xml
      --log-level=debug
      update

    volumes:
      - ./config:/changelog
      - ./drivers:/liquibase/lib

    working_dir: /config/