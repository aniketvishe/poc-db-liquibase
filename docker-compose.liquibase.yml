services:
  lobo-liquibase:
    image: liquibase/liquibase:4.23

    command: >
      update
      --changelog-file=changelog.xml
      --username=postgres
      --password=postgres
      --url=jdbc:postgresql://lobo-db:5432/postgres

    volumes:
      - ./config/changelog.xml:/liquibase/changelog.xml
      - ./scripts:/liquibase/scripts

    networks:
      - lobo-net