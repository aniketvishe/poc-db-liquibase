version: '3.8'

services:
  lobo-liquibase:
    image: liquibase/liquibase:latest
    container_name: lobo-liquibase

    command: >
      --url=jdbc:oracle:thin:@//192.168.2.185:1521/XE
      --username=system
      --password=oracle
      --changeLogFile=changelog.xml
      update

    volumes:
      - ./liquibase:/liquibase/changelog
      - ./drivers/ojdbc8.jar:/liquibase/lib/ojdbc8.jar