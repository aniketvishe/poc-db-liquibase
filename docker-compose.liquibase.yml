services:
  lobo-liquibase:
    container_name: lobo-liquibase
    image: liquibase/liquibase:5.0.2

    command: >
      sh -c "
      wget -q https://repo1.maven.org/maven2/com/oracle/database/jdbc/ojdbc8/21.9.0.0/ojdbc8-21.9.0.0.jar -O /liquibase/ojdbc8.jar &&
      liquibase
      --driver=oracle.jdbc.OracleDriver
      --classpath=/liquibase/ojdbc8.jar
      --changelog-file=changelog.xml
      --username=system
      --password=oracle
      --url=jdbc:oracle:thin:@192.168.2.185.docker.internal:1521/XEPDB1
      update
      "

    volumes:
      - ./config/changelog.xml:/liquibase/changelog.xml
      - ./scripts:/liquibase/scripts

    networks:
      - lobo-net

networks:
  lobo-net:
    external: true